<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <h:head>
        <title>Olvido de contraseña</title>
        <link href="../../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Citas/agendarCita.css" rel="stylesheet" type="text/css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </h:head>
    <h:body styleClass="fondo">
        <f:view locale="es">
            <!-- AREA DE TRABAJO -->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb espacioc">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Cambiar contraseña</li>
                </ol>
            </nav> 
            <h:messages globalOnly="true" showDetail="true" class="text-info h4"/>
            <h:form>
                <div class="dropdown d-flex justify-content-end">
                    <button type="button" class="lanbtn btn dropdown-toggle"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <img src="../../resources/img/banderas partidas 2.png" alt="" style="width:25px; height:20px;"/>
                        #{pagesEti[languages.idiomaSeleccionado.language]}
                    </button>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                            <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                           value="#{pagesEti[idioma.language]}"/>
                        </c:forEach>    
                    </div>
                </div>
            </h:form>
            <div class="container">
                <div class="formulario d-block mx-auto">
                    <div class="titulo">
                        <h1 class="text-center text-uppercase">Cambiar contraseña</h1>
                    </div>
                    <h:form>
                        <div class="form-group">
                            <h:outputLabel for="doc" styleClass="text-uppercase" value="Número de documento"/>
                            <h:inputText id="doc" styleClass="form-control form" a:type="number" value="#{usuarioController.usuario.numDocumento}"/>
                            <h:message for="doc"/>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <h:outputLabel for="correo" styleClass="text-uppercase" value="Nueva contraseña"/>
                                <h:inputText id="correo" styleClass="form-control form" a:type="password" value="#{usuarioController.usuario.pass}"/>
                                <h:message for="correo"/>
                            </div>
                            <div class="form-group col-md-6">
                                <h:outputLabel for="conf" styleClass="text-uppercase" value="Repite Contraseña"/>
                                <h:inputText id="conf" styleClass="form-control form" a:type="password" value="#{usuarioController.contra}"/>
                                <h:message for="conf"/>
                            </div>
                        </div>
                        <div class="text-center">
                            <h:commandButton action="#{usuarioController.cambiarContra()}" class="btn boton" value="#{universEti.enviar}"/>
                        </div>
                    </h:form>
                </div>
            </div>
        </f:view>
        <script src="../../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
    </h:body>
</html>
