<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <h:head>
        <title>Crear Servicio</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="../../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Servicios/crearServicio.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body styleClass="fondo">
        <f:view locale="#{languages.idiomaSeleccionado}">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <a href="crearServicio.xhtml"></a>
                    <li class="breadcrumb-item  text-right"><a href="#">Home</a></li>
                    <li class="breadcrumb-item  active" aria-current="page">#{servisEti.crearServicioMi}</li>
                </ol>
            </nav>
            <h:messages globalOnly="true" showDetail="true" class="mensajes"/>
            <h:form>
                <div class="dropdown d-flex justify-content-end">
                    <button type="button" class="lanbtn btn dropdown-toggle"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        #{pagesEti[languages.idiomaSeleccionado.language]}
                    </button>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                            <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                           value="#{pagesEti[idioma.language]}"/>
                        </c:forEach>    
                    </div>
                </div>
            </h:form>
            <div class="container">

                <div class="formulario d-block mx-auto">
                    <div class="titulo">
                        <h1 class="text-center">#{servisEti.crearServicio}</h1>
                    </div>
                    <h:form>

                        <div class="form-group">
                            <h:outputLabel for="nombreServicio" value="#{servisEti.nombreServicio}"/>
                            <h:inputText id="nombreServicio" value="#{serviciosController.servicios.nombre}" a:placeholder="#{servisEti.placeNombre}" styleClass="form form-control"/>
                            <h:message for="nombreServicio"/>

                            <h:outputLabel for="estado" value="#{servisEti.estadoServicio}"/>
                            <h:selectOneMenu value="#{serviciosController.servicios.estado}" styleClass="form form-control">
                                <f:selectItem itemLabel="#{universEti.seleccionar}" itemValue="0" noSelectionOption="true"/>
                                <f:selectItem itemLabel="Activo" itemValue="Activo"/>
                                <f:selectItem itemLabel="Inactivo" itemValue="Inactivo"/>
                            </h:selectOneMenu>
                            <h:message for="estado"/>
                            
                            <h:outputLabel for="valor" value="#{servisEti.valorServicio}"/>
                            <h:inputText id="valor" value="#{serviciosController.servicios.valor}" a:placeholder="#{servisEti.placeValor}" styleClass="form form-control" />
                            <h:message for="valor"/>
                            
                            <h:outputLabel for="tiempoEstimado" value="#{servisEti.tiempoServicio}"/>
                            <h:selectOneMenu value="#{serviciosController.servicios.tiempoEstimado}" styleClass="form form-control">
                                <f:selectItem itemLabel="#{universEti.seleccionar}" itemValue="0" noSelectionOption="true"/>
                                <f:selectItem itemLabel="30 Minutos" itemValue="30"/>
                                <f:selectItem itemLabel="1 Hora" itemValue="60"/>
                                <f:selectItem itemLabel="1 Hora y 30 Minutos" itemValue="90"/>
                                <f:selectItem itemLabel="2 Horas" itemValue="120"/>
                                <f:selectItem itemLabel="2 Horas y 30 Minutos" itemValue="150"/>
                                <f:selectItem itemLabel="3 Horas" itemValue="180"/>
                                <f:selectItem itemLabel="3 Horas y 30 Minutos" itemValue="210"/>
                                <f:selectItem itemLabel="4 Horas" itemValue="240"/>
                                <f:selectItem itemLabel="4 Horas y 30 Minutos" itemValue="270"/>
                            </h:selectOneMenu>
                            <h:message for="tiempoEstimado"/>
                        </div>

                        <div class="text-center">
                            <h:commandButton value="#{universEti.registrar}" action="#{serviciosController.registrarServicios()}" styleClass="btn boton"/>
                        </div>
                    </h:form>
                </div>
            </div>

            <!-- BOOTSTRAP -->
            <script src="../../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
            <script src="../../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
            <script src="../../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
        </f:view>
    </h:body>
</html>
