<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <h:head>
        <title>Generar Pagos</title>
        <link href="../../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Pagos/estilos-generar-pagos.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body class="fondo">
        <f:view locale="#{languages.idiomaSeleccionado}">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item  text-right"><a href="#">Home</a></li>
                    <li class="breadcrumb-item  active" aria-current="page">#{pagosEti.generar}</li>
                </ol>
            </nav>
            <h:messages globalOnly="true" showDetail="true" class="mensajes"/>
            <h:form>
                <div class="dropdown d-flex justify-content-end">
                    <button type="button" class="lanbtn btn dropdown-toggle"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <img src="../../resources/img/banderas partidas 2.png" alt="" style="width:25px; height:20px;"/>
                        #{pagesEti[languages.idiomaSeleccionado.language]}
                    </button>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                            <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                           value="#{pagesEti[idioma.language]}"/>
                        </c:forEach>    
                    </div>
                </div>
            </h:form>
            <div class="container">
                <div class="formulario d-block mx-auto">
                    <div class="titulo">
                        <h1 class="text-center text-uppercase">#{pagosEti.generar}</h1>
                    </div>
                    <h:form>
                        <div class="form-group col">
                            <h:outputLabel value="#{pagosEti.empleado}" for="idEmpleado"/>
                            <h:selectOneMenu id="empleado" value="#{pagosController.empleado.idEmpleado}" styleClass="form form-control">
                                <f:selectItem itemLabel="#{universEti.seleccionar}" itemValue="0" noSelectionOption="true"/>
                                <f:selectItems value="#{pagosController.listEmpleado}" var="emp" 
                                               itemValue="#{emp.idEmpleado}" 
                                               itemLabel="#{emp.idUsuario.nombre}"/>
                            </h:selectOneMenu>
                            <h:message for="empleado"/>
                        </div> 
                        
                        <div class="form-group col">
                            <h:outputLabel for="fechaI" value="#{citasEti.fecha} inicial"/>
                            <h:inputText id="fechaI" 
                                         styleClass="form form-control" 
                                         a:type="date"
                                         value="#{pagosController.fechaInicial}" 
                                         >
                                <f:convertDateTime for="fecha" type="date" pattern="yyyy-MM-dd"></f:convertDateTime>
                            </h:inputText>
                            <h:message for="fechaI"/>
                        </div> 
                        
                        <div class="form-group col">
                            <h:outputLabel for="fechaF" value="#{citasEti.fecha} final"/>
                            <h:inputText id="fechaF" 
                                         styleClass="form form-control" 
                                         a:type="date"
                                         value="#{pagosController.fechaFinal}" 
                                         >
                                <f:convertDateTime for="fecha" type="date" pattern="yyyy-MM-dd"></f:convertDateTime>
                            </h:inputText>
                           <h:message for="fechaF"/>
                        </div> 

                        <h:commandButton value="#{usuariosEti.enviar}" action="#{pagosController.registrarPago()}" styleClass="btn boton d-block mx-auto"/>
                    </h:form>
                </div>
            </div>
            <!-- BOOTSTRAP -->
            <script src="../../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
            <script src="../../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
            <script src="../../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
        </f:view>
    </h:body>
</html>
