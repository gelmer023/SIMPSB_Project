<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
    <h:head>
        <title>Factura</title>
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
        <!-- Estilos css -->
        <link href="../../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Pagos/estilos-generar-pagos.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body class="fondo"> <!-- Fondo-->
        <!-- Mensaje de Controladores -->
        <!-- Migas De pan , si funcionar -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item  text-right"><a href="#">Home</a></li>
                <li class="breadcrumb-item  active" aria-current="page">Facturación</li>
            </ol>
        </nav>
        <h:messages globalOnly="true" showDetail="true" class="mensajes"/>
        <h:form enctype="multipart/form-data">
            <div class="dropdown d-flex justify-content-end">
                <button type="button" class="lanbtn btn dropdown-toggle"
                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <img src="../resources/img/banderas partidas 2.png" alt="" style="width:25px; height:20px;"/>
                    #{pagesEti[languages.idiomaSeleccionado.language]}
                </button>
                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                    <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                        <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                       value="#{pagesEti[idioma.language]}"/>
                    </c:forEach>    
                </div>
            </div>
        </h:form>
        <!-- Contenedor -->
        <div class="container">
            <!-- fONDO DE FORMULARIO -->
            <div class="formulario d-block mx-auto" style="margin-top: 50px;">
                <div class="titulo">
                    <h1 class="text-center">FACTURAR CITA</h1>
                </div>
                <style>
                    .margen{
                        margin-left: 70px;
                        margin-right: 70px;
                    }
                    .subr{
                        padding-bottom: 10px;
                        border-bottom: 3px solid #D4AF37;
                    }
                </style>
                <h:form>
                    <h:inputHidden value="#{citasController.citas.idCita}"/>
                    <h:inputHidden value="#{citasController.servicios.idServicio}"/>
                    <h:inputHidden value="#{citasController.empleado.idEmpleado}"/>
                    <div class="margen">
                        <div class="form-group row ">
                            <div class="col-md-6 text-center">
                                <h:outputLabel value="Nombre: " class="text-center" for="nombre"/>
                            </div>

                            <div class="col-md-6 subr">
                                <h:inputText a:type="text" 
                                             readonly="true" 
                                             class="form-control-plaintext text-light text-center" 
                                             id="nombre" 
                                             value="#{citasController.citas.idCliente.idUsuario.nombre} #{citasController.citas.idCliente.idUsuario.apellido}"/>
                            </div>
                        </div>

                        <div class="form-group row ">
                            <div class="col-md-6 text-center">
                                <h:outputLabel value="Documento: " for="doc" class="text-center"/>
                            </div>

                            <div class="col-md-6 subr">
                                <h:inputText a:type="text" readonly="true" 
                                             class="form-control-plaintext text-light text-center" 
                                             id="doc" 
                                             value="#{citasController.citas.idCliente.idUsuario.numDocumento}"/>
                            </div>
                        </div>

                        <div class="form-group row ">
                            <div class="col-md-6 text-center">
                                <h:outputLabel value="Empleado: " for="empleado" class="text-center"/>
                            </div>

                            <div class="col-md-6 subr">
                                <h:inputText a:type="text" readonly="true" 
                                             class="form-control-plaintext text-light text-center" 
                                             id="empleado" 
                                             value="#{citasController.citas.idEmpleado.idUsuario.nombre} #{citasController.citas.idEmpleado.idUsuario.apellido}"/>
                            </div>
                        </div>

                        <div class="form-group row ">
                            <div class="col-md-6 text-center">
                                <h:outputLabel value="Total: " for="total" class="text-center"/>
                            </div>

                            <div class="col-md-6 subr">
                                <h:inputText a:type="text" readonly="true" 
                                             class="form-control-plaintext text-light text-center" 
                                             id="total" 
                                             value="#{citasController.citas.valorTotal}"/>
                            </div>
                        </div>

                        <div class="form-group row ">
                            <div class="col-md-6">
                                <h:commandButton value="Agregar Servicios" 
                                                 styleClass="btn boton d-block mx-auto" 
                                                 action="agregarServicios?faces-redirect=true" 
                                                 style="width : 200px; margin-top: 30px; margin-bottom: 20px ;" />
                            </div>

                            <div class="col-md-6">
                                <h:commandButton value="Facturar" 
                                                 styleClass="btn boton d-block mx-auto" 
                                                 action="#{citasController.generarFactura()}" 
                                                 style="margin-top: 30px; margin-bottom: 20px;"/>
                            </div>
                        </div>
                    </div>
                </h:form>
            </div>
        </div> 
        <!-- BOOTSTRAP -->
        <script src="../../../resources/js/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/popper.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/bootstrap.min.js" type="text/javascript"></script>
        <!-- DATATABLES -->
        <script src="../../../resources/js/tablas/dataTables.buttons.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/datatables.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/jszip.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/pdfmake.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/vfs_fonts.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/buttons.html5.min.js" type="text/javascript"></script>

        <script src="../../../resources/js/dataTables.responsive.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/botones.js" type="text/javascript"></script>
    </h:body>
</html>
