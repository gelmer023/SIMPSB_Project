<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">
    <h:head>
        <title>Factura</title>
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>
        <!-- Estilos css -->
        <link href="../../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Pagos/estilos-generar-pagos.css" rel="stylesheet" type="text/css"/>
    </h:head>
    <h:body class="fondo"> <!-- Fondo-->
        <!-- Mensaje de Controladores -->
        <h:messages globalOnly="true" showDetail="true"/>
        <!-- Migas De pan , si funcionar -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item  text-right"><a href="#">Home</a></li>
                <li class="breadcrumb-item  active" aria-current="page">Facturación</li>
            </ol>
        </nav>

        <!-- Contenedor -->
        <div class="container">
            <!-- fONDO DE FORMULARIO -->
            <div class="formulario d-block mx-auto" style="margin-top: 50px;">
                <div class="titulo">
                    <h1 class="text-center">CALIFICA EL SERVICIO</h1>
                </div>
                <h:form>
                    <div class="form-row" style="margin-top: 20px">
                        <h:inputHidden value="#{citasController.citas.idCita}"/>
                        <h:inputHidden value="#{citasController.servicios.idServicio}"/>
                        <h:inputHidden value="#{citasController.empleado.idEmpleado}"/>    
                         <div class="form-group col-md-2" style="margin-left: 100px;">
                            <h:outputLabel for="servicio" value="#{citasEti.servicio}"/>
                        </div>
                        <div class="form-group col-md-7">
                            <h:selectOneMenu value="Calificacion" styleClass="form form-control">
                                <f:selectItem itemLabel="-- Selec
                                              cionar --" itemValue="0"/>
                                <f:selectItem itemLabel="Muy malo" itemValue="Muy malo"/>
                                <f:selectItem itemLabel="Malo" itemValue="Malo"/>
                                <f:selectItem itemLabel="Regular" itemValue="Regular"/>
                                <f:selectItem itemLabel="Bueno" itemValue="Bueno"/>
                                <f:selectItem itemLabel="Muy Bueno" itemValue="Muy Bueno"/>
                            </h:selectOneMenu>
                            <h:message for="calificacion"/>
                        </div>

                        <div class="form-group col-md-2" style="margin-left: 100px;">
                            <h:outputLabel for="empleado" value="Empleado:  "/>
                        </div>
                        
                         <div class="form-group col-md-7">
                           
                            <h:message for="empleado"/>
                        </div>
                        
                         <div class="form-group col-md-2" style="margin-left: 100px;">
                            <h:outputLabel for="Observacion" value="Observacion"/>
                        </div>
                        <div class="form-group col-md-7">
                            <h:inputText styleClass="form-control form-fondo form" id="subtotal" value="#{facturaController.detalle.subTotal}"/>
                            <h:message for="total"/>
                        </div>
                        <div class="form-group col-md-12">
                            <h:commandButton value="Calificar" styleClass="btn boton d-block mx-auto" action="#{facturaController.generarFactura()}" style="margin-top: 30px; margin-bottom: 20px;"/>
                        </div>
                    </div>
                </h:form>
            </div>
        </div> 
        <!-- BOOTSTRAP -->
        <script src="../../../resources/js/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/popper.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/bootstrap.min.js" type="text/javascript"></script>
        <!-- DATATABLES -->
        <script src="../../../resources/js/tablas/dataTables.buttons.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/datatables.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/jszip.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/pdfmake.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/vfs_fonts.js" type="text/javascript"></script>
        <script src="../../../resources/js/tablas/buttons.html5.min.js" type="text/javascript"></script>

        <script src="../../../resources/js/dataTables.responsive.min.js" type="text/javascript"></script>
        <script src="../../../resources/js/botones.js" type="text/javascript"></script>
    </h:body>
</html>
