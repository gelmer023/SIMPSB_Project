<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <h:head>
        <title>Olvido de contraseña</title>
        <link href="../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../../resources/css/Index/estilosLogin.css" rel="stylesheet" type="text/css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    </h:head>
    <h:body class="fondo">
        <f:view locale="#{languages.idiomaSeleccionado}">
            <!-- AREA DE TRABAJO -->
            <div class="area-trabajo">
                <div class="container">
                    <h:messages globalOnly="true" showDetail="true" class="text-info h4"/>
                    <h:form>
                        <div class="dropdown d-flex justify-content-end">
                            <button type="button" class="lanbtn btn dropdown-toggle"
                                    data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <img src="../resources/img/banderas partidas 2.png" alt="" style="width:25px; height:20px;"/>
                                #{pagesEti[languages.idiomaSeleccionado.language]}
                            </button>
                            <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                                <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                                    <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                                   value="#{pagesEti[idioma.language]}"/>
                                </c:forEach>    
                            </div>
                        </div>
                    </h:form>

                    <h:form styleClass="d-block mx-auto formu">
                        <h1 class="text-center text-uppercase">#{indexEti.olvidocon}</h1>
                        <div class="form-group">
                            <h:outputLabel for="doc" styleClass="text-uppercase" value="#{usuariosEti.documento}"/>
                            <h:inputText id="doc" styleClass="form-control form" a:type="number" value="#{mailController.usuario.numDocumento}"/>
                            <h:message for="doc"/>
                        </div>
                        <div class="form-group">
                            <h:outputLabel for="correo" styleClass="text-uppercase" value="#{indexEti.form_email}"/>
                            <h:inputText id="correo" styleClass="form-control form" a:type="email" value="#{mailController.destinatario}"/>
                            <h:message for="correo"/>
                        </div>
                        <div class="text-center">
                            <h:commandButton action="#{mailController.recuperacionContra()}" class="btn boton" value="#{universEti.enviar}"/>
                            <a href="../../index.xhtml" class="text-decoration-none text-warning">#{universEti.volver}</a>
                        </div>
                    </h:form>
                </div>
            </div>
        </f:view>
        <script src="../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
        <script src="../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
        <script src="../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
    </h:body>
</html>
