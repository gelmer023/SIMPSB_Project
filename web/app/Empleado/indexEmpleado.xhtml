<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

    <h:head>
        <title>Supervisor</title>
        <link href="../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../resources/css/estilos-perfiles.css" rel="stylesheet" type="text/css"/>

    </h:head>

    <h:body class="fondo">
        <f:view locale="#{languages.idiomaSeleccionado}">
            <!-- SIDEBAR -->
            <div class="col-2 sidebar float-left">
                 <div class="perfil">
                        <p class="text-center text-uppercase">Empleado</p>
                        <h:graphicImage value="#{user.getFoto()}" class="estilosFtPerfil"/>
                        <p class="text-center text-uppercase">#{user.getNombre()} #{user.getApellido()}</p>
                        <h:commandButton action="#{sesionController.logout()}" value="Cerrar Sesion"
                                         styleClass="btn text-warning d-block mx-auto" style="color: #fff; margin-top: 10px; margin-left: 80px; background: black;"/>
                    </div>
                <div class="modulos">
                    <h:form>
                        <!-- HOME -->
                        <div class="modulo d-block mx-auto">
                            <img class="float-left" src="../resources/img/icono_home.png" alt=""/>
                            <h4>
                                <a href="../Principal/principalEmpleado.xhtml" target="area-trabajo">HOME</a>
                            </h4>
                        </div>
                        <!-- CITAS -->
                        <div class="modulo d-block mx-auto">
                            <img class="float-left" src="../resources/img/icono_citas.png" alt=""/>
                            <h5>
                                <a href="#">#{perfilEti.Citas}</a>
                            </h5>
                            <p>
                                <a href="../Supervisor/Citas/consultarCita.xhtml" target="area-trabajo">#{perfilEti.consultarCita}</a>
                            </p>
                        </div>
                        <!-- HORARIOS -->
                        <div class="modulo d-block mx-auto">
                            <img class="float-left" src="../resources/img/icono_horarios.png" alt=""/>
                            <h5>
                                <a href="#">#{perfilEti.Horarios}</a>
                            </h5>
                            <p>
                                <a href="../Supervisor/Horarios/consultarHorario.xhtml" target="area-trabajo">#{perfilEti.consultarHorarios}</a>
                            </p>
                        </div>
                        <!-- PAGOS -->
                        <div class="modulo d-block mx-auto">
                            <img class="float-left" src="../resources/img/icono_pagos.png" alt=""/>
                            <h5><a href="#">#{perfilEti.Pagos}</a></h5>
                            <p><a href="../Supervisor/Pagos/consultarPago.xhtml" target="area-trabajo">#{perfilEti.consultarPagos}</a></p>
                        </div>


                        <!-- REPORTES -->
                        <div class="modulo d-block mx-auto">
                            <img class="float-left" src="../resources/img/icono_reportes.png" alt=""/>
                            <h4>
                                 <h:commandButton actionListener="#{empleadoController.verCertificado()}" value="Cer" styleClass="btn btn-warning">

                                </h:commandButton>
                            </h4>
                        </div> 
                    </h:form>
                </div>
            </div>
            <!-- AREA DE TRABAJO -->
            <div class="col-10 derecho float-right">
                <nav class="navbarra float-right col-12">
                    <div class="row">
                        <div class="col-6 logo">
                            <p><img src="../resources/img/logo.png" alt=""/></p>
                        </div>
                        <div class="col-3"></div>
                        <div class="col-3 config">
                            <ul>
                                <li>
                                    <a href="#"><img src="../resources/img/config.png" alt=""/></a>
                                    <ul>
                                       <li>
                                            <h:form>
                                                <img src="../resources/img/editar-perfil.png" alt=""/>
                                                <h:commandLink action="#{usuarioController.editarU(us)}" 
                                                                 value="Editar Perfil"  a:target="area-trabajo" styleClass="btn boton" style="color: #fff; margin-top: 10px;"/>
                                            </h:form>
                                        </li>
                                        <li>
                                            <h:form>
                                            <img src="../resources/img/ajustes.png" alt="" style="margin-left: 10px; "/><h:commandLink    action="Config/cambiarContra.xhtml?faces-redirect=true" value="Cambiar Contraseña" a:target="area-trabajo" 
                                                                                                             style="color: #fff; margin-top: 0px; margin-left: 0px; text-align: center"/>
                                            </h:form>
                                        </li>
                                    </ul>
                                </li>
                            </ul>
                        </div>
                    </div>
                </nav>
                <div class="cargado">
                    <iframe name="area-trabajo" src="../Principal/principalEmpleado.xhtml?faces-redirect=true" ></iframe>
                </div>
            </div>
        </f:view>
    </h:body>

    <!-- SCRIPTS -->
    <script src="../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
    <script src="../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
    <script src="../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
</html>
