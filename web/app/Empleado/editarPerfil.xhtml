<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
    <h:head>
        <title>Editar Perfil</title>
        <link href="../../resources/css/Bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css"/>
        <link href="../resources/css/Usuarios/crearUsuario.css" rel="stylesheet" type="text/css"/>

    </h:head>
    <h:body styleClass="fondo">
        <f:view locale="#{languages.idiomaSeleccionado}">           
            <!--Migas de Pan-->
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">Home</a></li>
                    <li class="breadcrumb-item active" aria-current="page">#{usuariosEti.editarPerfil}</li>
                </ol>
            </nav> 
            <h:messages globalOnly="true" showDetail="true" class="mensajes"/>
            <h:form enctype="multipart/form-data">
                <div class="dropdown d-flex justify-content-end">
                    <button type="button" class="lanbtn btn dropdown-toggle"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <img src="../resources/img/banderas partidas 2.png" alt="" style="width:25px; height:20px;"/>
                        #{pagesEti[languages.idiomaSeleccionado.language]}
                    </button>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        <c:forEach items="#{languages.idiomasSoportados}" var="idioma">
                            <h:commandLink class="dropdown-item" actionListener="#{languages.cambiarIdioma(idioma)}"
                                           value="#{pagesEti[idioma.language]}"/>
                        </c:forEach>    
                    </div>
                </div>
            </h:form>
            <!-- Area de Trabajo -->
            <div class="container">
                <div class="formulario d-block mx-auto" style="margin-top: 20px">
                    <div class="titulo">
                        <h1 class="text-center text-uppercase">#{usuariosEti.editarPerfil}</h1>
                    </div>
                    <div>
                    <h:form enctype="multipart/form-data">
                        <h:inputHidden value="#{usuarioController.usuario.pass}"/>
                        <h:outputLabel for="imagen" value=""/>
                        <div class="foto">
                            <p style="text-align: center;"> #{usuariosEti.fotoActual} </p>
                            <h:graphicImage value="#{user.getFoto()}" class="estilosFtPerfil" style="margin-left: 375px;"/>
                            <br></br>
                            <h:inputFile a:accept=".jpg" a:type="file" class="form-control" value="#{usuarioController.imagen.file}" style="margin-bottom: 10px; margin-top: 15px"/>
                            <br></br>
                        </div>
                        <h:commandButton onclick="document.location.reload();" action="#{usuarioController.cambiarFoto()}" value="#{universEti.subirA}" class="btn boton" style="margin-left: 465px; margin-bottom: 20px;"/>
                    </h:form>
                    </div>
                    <h:form>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <h:outputLabel for="nombre" value="#{usuariosEti.nombre}"/>
                                <h:inputText value="#{usuarioController.usuario.nombre}" id="nombre" a:type="text" styleClass="form-control form" a:placeholder="#{usuariosEti.placeNom}"/>
                                <h:message for="nombre"/>
                            </div>

                            <div class="form-group col-md-6">
                                <h:outputLabel for="apellido" value="#{usuariosEti.apellido}"/>
                                <h:inputText required="true" value="#{usuarioController.usuario.apellido}" id="apellido" a:type="text" styleClass="form-control form" a:placeholder="#{usuariosEti.placeApe}"/>
                                <h:message for="apellido"/>
                            </div>
                        </div>

                        <div class="form-group">
                            <h:outputLabel for="correo" value="#{usuariosEti.correo}"/>
                            <h:inputText value="#{usuarioController.usuario.correo}" id="correo" styleClass="form-control form" a:type="email" a:placeholder="#{usuariosEti.placeCorr}"/>
                            <h:message for="correo"/> 
                        </div>

                        <div class="form-row">
                            <div class="form-group  col-md-6">
                                <h:outputLabel for="documento" value="#{usuariosEti.documento}"/>
                                <h:inputText value="#{usuarioController.usuario.numDocumento}" id="documento" a:type="number" styleClass="form-control form" a:placeholder="#{usuariosEti.placeDoc}"/>
                                <h:message for="documento"/>
                            </div>
                            <div class="form-group col-md-6">
                                <h:outputLabel for="genero" value="#{usuariosEti.genero}"/>
                                <h:selectOneMenu value="#{usuarioController.usuario.genero}" styleClass="form-control form">
                                    <f:selectItem itemValue="0" itemLabel="-- Seleccionar --" noSelectionOption="true"/>
                                    <f:selectItem itemValue="Femenino" itemLabel="#{usuariosEti.feme}"/>
                                    <f:selectItem itemValue="Masculino" itemLabel="#{usuariosEti.mascu}"/>
                                </h:selectOneMenu>
                            </div>
                        </div>

                        <h:commandButton action="#{usuarioController.modificarUsuario()}" styleClass="btn boton d-block mx-auto" value="#{usuariosEti.btn_registrar}"/>
                    </h:form>
                </div>
            </div>
        </f:view>
        <!-- BOOTSTRAP -->
        <script src="../../resources/js/Bootstrap/jquery-3.3.1.slim.min.js" type="text/javascript"></script>
        <script src="../../resources/js/Bootstrap/popper.min.js" type="text/javascript"></script>
        <script src="../../resources/js/Bootstrap/bootstrap.min.js" type="text/javascript"></script>
    </h:body>
</html>
